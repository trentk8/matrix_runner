<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Matrix Runner</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="application-name" content="Matrix Runner" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Matrix Runner" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <link
    rel="icon"
    type="image/svg+xml"
    href="assets/icons/matrix-runner-icon.svg"
  />
  <link
    rel="apple-touch-icon"
    href="assets/icons/matrix-runner-icon.svg"
  />
  <link
    rel="mask-icon"
    href="assets/icons/matrix-runner-icon.svg"
    color="#00ffff"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <canvas id="gameCanvas" width="1920" height="1080"></canvas>
    <canvas id="minimapCanvas" width="256" height="256"></canvas>
    <div id="hud"></div>
    <div id="menu"></div>
    <div id="notifications"></div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
